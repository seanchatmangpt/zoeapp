appId: com.anonymous.expo-supabase-ai-template
name: Publish Sermon - Local Actor Success

---
- runFlow: 00_boot.yaml

- tapOn:
    id: "dev-actor-lab-tab"

- assertVisible:
    id: "actor-runtime-ready"

- tapOn: "Sermons"

- tapOn:
    id: "sermon-title-input"

- inputText: "The Good Shepherd"

- tapOn:
    id: "sermon-video-input"

- inputText: "https://example.com/sermon.mp4"

- tapOn:
    id: "publish-sermon-submit"

- assertVisible:
    id: "receipt-status"

- assertVisible: "accepted_pending"

- tapOn:
    id: "arrow-left"

- assertVisible:
    id: "outbox-count"

- assertVisible: "1"

- assertVisible:
    id: "latest-event-type"

- assertVisible: "SermonPublished"

- assertVisible:
    id: "sermon-title-rendered"

- assertVisible: "The Good Shepherd"
